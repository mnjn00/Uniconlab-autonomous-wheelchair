footprint: [[0.485, 0.300], [0.485, -0.300], [-0.485, -0.300], [-0.485, 0.300]]
footprint_padding: 0.08
transform_tolerance: 0.25
map_type: costmap

obstacle_layer:
  enabled: true
  obstacle_range: 3.5
  raytrace_range: 4.5
  track_unknown_space: true
  combination_method: 1
  observation_sources: obstacle_cloud
  obstacle_cloud:
    data_type: PointCloud2
    topic: /perception/obstacle_cloud
    sensor_frame: lidar_link
    marking: true
    clearing: true
    observation_persistence: 0.50
    expected_update_rate: 0.20
    min_obstacle_height: 0.05
    max_obstacle_height: 1.80

inflation_layer:
  enabled: true
  inflation_radius: 0.70
  cost_scaling_factor: 3.0

static_layer:
  enabled: true
  map_topic: /map
  subscribe_to_updates: true

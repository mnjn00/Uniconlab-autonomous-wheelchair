base_global_planner: navfn/NavfnROS
base_local_planner: dwa_local_planner/DWAPlannerROS
planner_frequency: 0.0
controller_frequency: 10.0
planner_patience: 4.0
controller_patience: 2.0
oscillation_timeout: 6.0
oscillation_distance: 0.15
recovery_behavior_enabled: false
clearing_rotation_allowed: false
shutdown_costmaps: false
conservative_reset_dist: 1.0

NavfnROS:
  allow_unknown: false
  default_tolerance: 0.0

simulation_speed_profiles:
  hardware_motion_authorized: false
  passenger_operation_authorized: false
  sidewalk:
    max_linear_speed: 0.55
    max_angular_speed: 0.85
  road_free_space:
    max_linear_speed: 0.70
    max_angular_speed: 1.00

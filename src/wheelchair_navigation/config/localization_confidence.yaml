    minimum_selected_points: 16
    maximum_selected_points: 128
    planar_range_min_m: 0.5
    planar_range_max_m: 20.0
    base_z_min_m: 0.15
    base_z_max_m: 2.0
  scan_map_residual:
    statistic: robust_median_point_to_nearest_occupied_map
    threshold_rule: min(calibrated_p99_good, software_rc_ceiling_m)
    software_rc_ceiling_m: 0.20
  inlier_fraction:
    distance_m: 0.20
    threshold_rule: max(calibrated_p1_good, software_rc_floor)

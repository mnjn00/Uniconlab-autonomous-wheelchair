  continuity_planar_max_m: 0.25
  continuity_yaw_max_deg: 10.0
  continuity_jump_exception: explicit_RELOCALIZING_only
  map_identity: exact_map_id_and_sha256
  reset_count: monotonic
  frozen_pose_detection: pose_must_not_remain_frozen_while_odom_moves

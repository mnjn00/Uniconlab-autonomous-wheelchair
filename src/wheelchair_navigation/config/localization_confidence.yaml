  window_duration_s: 1.0
  maximum_false_ok_windows: 0
  false_ok_planar_error_above_m: 0.50
  false_ok_yaw_error_above_deg: 15
  claim_limit: software_evidence_not_hardware_probability
thresholds:
  candidate_age_max_s: 0.25
  tf_age_max_s: 0.25
  planar_covariance: finite_positive_definite

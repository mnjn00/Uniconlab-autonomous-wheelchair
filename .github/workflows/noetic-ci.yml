name: ROS Noetic software RC

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: Run the explicit release qualification gates
        required: true
        default: false
        type: boolean
      rollback_parent:
        description: Strict JSON parent rollback binding for a complete release only
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  software-rc:
    runs-on: ubuntu-20.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Build pinned Noetic image
        run: docker build --pull=false --tag wheelchair-noetic-ci:${GITHUB_SHA} --file tools/noetic/Dockerfile .
      - name: Resolve dependencies and build catkin workspace
        run: |
          mkdir -p reports
          docker run --rm -v "$PWD/reports:/ws/reports" wheelchair-noetic-ci:${GITHUB_SHA} bash -lc '
            source /opt/ros/noetic/setup.bash
            rosdep check --from-paths src --ignore-src --rosdistro=noetic
            catkin_make -DCMAKE_BUILD_TYPE=Release'
      - name: Full pytest and WP0 contract validation
        run: |
          docker run --rm -v "$PWD/reports:/ws/reports" wheelchair-noetic-ci:${GITHUB_SHA} bash -lc '
            source /opt/ros/noetic/setup.bash
            python3 -m pytest --junitxml=reports/pytest.xml
            python3 scripts/validate_wp0_contracts.py'
      - name: Xacro and URDF validation
        run: |
          docker run --rm wheelchair-noetic-ci:${GITHUB_SHA} bash -lc '
            source /opt/ros/noetic/setup.bash
            xacro src/wheelchair_description/urdf/wheelchair.urdf.xacro > /tmp/wheelchair.urdf
            check_urdf /tmp/wheelchair.urdf'
      - name: Static sole-command-path no-bypass gate
        run: |
          docker run --rm -v "$PWD/reports:/ws/reports" wheelchair-noetic-ci:${GITHUB_SHA} bash -lc '
            source /opt/ros/noetic/setup.bash
            python3 -m pytest src/wheelchair_safety/tests/test_no_bypass_invariant.py tests/test_decision_no_twist.py \
              --junitxml=reports/no-bypass.xml'
      - name: Fake/replay algorithm fixtures (not live evidence)
        run: |
          docker run --rm -v "$PWD/reports:/ws/reports" wheelchair-noetic-ci:${GITHUB_SHA} bash -lc '
            source /opt/ros/noetic/setup.bash
            python3 -m pytest tests/test_rc_scenario_runner.py src/wheelchair_gazebo/tests/test_rc_world_static.py \
              --junitxml=reports/scenario-fixtures.xml'
      - name: Validate strict release tooling without claiming release authority
        run: |
          docker run --rm wheelchair-noetic-ci:${GITHUB_SHA} bash -lc '
            python3 -m pytest tests/test_release_manifest.py
            python3 scripts/generate_release_manifest.py --help
            python3 scripts/verify_release_manifest.py --help'
          printf '%s\n' 'INCOMPLETE SOFTWARE EVIDENCE: pytest/build reports are not AC0-AC6 release reports; no clean manifest was generated.' > reports/INCOMPLETE_SOFTWARE_EVIDENCE.txt
      - name: Upload incomplete software evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: noetic-incomplete-software-evidence-${{ github.sha }}
          path: reports/
          if-no-files-found: error
          retention-days: 30

  gazebo-live-gate:
    if: github.event_name == 'workflow_dispatch' && inputs.release
    needs: software-rc
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4
      - name: Run real ROS/Gazebo surface; unavailable is a failure
        run: |
          test -x scripts/run_gazebo_rc_suite.py || { echo 'BLOCKED: real Gazebo scenario runner is unavailable'; exit 2; }
          source /opt/ros/noetic/setup.bash || { echo 'BLOCKED: ROS Noetic/Gazebo is unavailable'; exit 2; }
          python3 scripts/run_gazebo_rc_suite.py --config src/wheelchair_gazebo/config/scenarios.yaml --output gazebo-live-report.json
      - name: Upload Gazebo live evidence when available
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gazebo-live-${{ github.sha }}
          path: gazebo-live-report.json
          if-no-files-found: warn
          retention-days: 30

  external-full-bag-gate:
    if: github.event_name == 'workflow_dispatch' && inputs.release
    needs: software-rc
    runs-on: ubuntu-20.04
    steps:
      - name: Require externally acquired full-bag qualification
        run: |
          echo 'BLOCKED: CI has no external full sensor bag and cannot manufacture replay evidence.'
          exit 2

  target-nuc-gate:
    if: github.event_name == 'workflow_dispatch' && inputs.release
    needs: software-rc
    runs-on: ubuntu-20.04
    steps:
      - name: Require target NUC qualification
        run: |
          echo 'BLOCKED: target-NUC qualification must be performed and attested externally.'
          exit 2

  hardware-passenger-gate:
    if: github.event_name == 'workflow_dispatch' && inputs.release
    needs: software-rc
    runs-on: ubuntu-20.04
    steps:
      - name: Refuse hardware or passenger authority from CI
        run: |
          echo 'BLOCKED: CI simulation/replay is not physical, hardware, or passenger authority.'
          exit 2

  release-manifest:
    if: github.event_name == 'workflow_dispatch' && inputs.release
    needs: [software-rc, gazebo-live-gate, external-full-bag-gate, target-nuc-gate, hardware-passenger-gate]
    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4
      - name: Generate only a complete strict software-only manifest
        env:
          ROLLBACK_PARENT: ${{ inputs.rollback_parent }}
          RELEASE_SIGNING_KEY: ${{ secrets.WHEELCHAIR_RELEASE_SIGNING_KEY }}
        run: |
          set -eu
          test -n "$ROLLBACK_PARENT"
          test -n "$RELEASE_SIGNING_KEY" || { echo 'BLOCKED: WHEELCHAIR_RELEASE_SIGNING_KEY is required'; exit 2; }
          umask 077
          key_file="$(mktemp "${RUNNER_TEMP:?}/wheelchair-release-key.XXXXXX")"
          trap 'rm -f "$key_file" "$RUNNER_TEMP/release-bindings.json"' EXIT
          printf '%s' "$RELEASE_SIGNING_KEY" > "$key_file"
          test -s "$key_file" || { echo 'BLOCKED: release signing key is empty'; exit 2; }
          python3 scripts/generate_release_manifest.py --root . --prepare-bindings \
            --bindings-output "$RUNNER_TEMP/release-bindings.json"
          python3 scripts/generate_release_manifest.py --root . --output release-manifest.json \
            --report evidence/contracts/abi-v1-report.json \
            --report evidence/topology/command-graph-report.json \
            --report evidence/route-safety/anti-widening-report.json \
            --report evidence/safety/collision-ttc-report.json \
            --report evidence/safety/slope-policy-report.json \
            --report evidence/safety/gate-permission-matrix.json \
            --report evidence/conversion/determinism-and-corruption-report.json \
            --report evidence/localization/confidence-holdout-report.json \
            --report evidence/localization/glim-offline-input-report.json \
            --report evidence/localization/glim-offline-reproduction-report.json \
            --report evidence/localization/glim-offline-comparison-report.json \
            --report evidence/mission/fsm-contract-report.json \
            --report evidence/performance/target-nuc-60min-report.json \
            --report evidence/simulation/fidelity-claim-report.json \
            --report evidence/release/rollback-drill-report.json \
            --report evidence/hardware/hardware-gate-negative-report.json \
            --report evidence/release/passenger-authority-negative-report.json \
            --rollback-parent "$ROLLBACK_PARENT" \
            --blocker hardware_motion_unqualified \
            --blocker passenger_operation_unqualified \
            --release-signing-key "$key_file"
          python3 scripts/verify_release_manifest.py release-manifest.json --root . \
            --release-signing-key "$key_file"
      - uses: actions/upload-artifact@v4
        with:
          name: noetic-complete-software-only-manifest-${{ github.sha }}
          path: release-manifest.json
          if-no-files-found: error
          retention-days: 30
